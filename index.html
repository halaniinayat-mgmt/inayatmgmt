<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inayat Management Co. — Artists & Creatives</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a08;--cream:#f0ead6;--accent:#d4ff00;--muted:#3a3a32;--border:#2a2a22;--red:#ff3c2f; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--cream);font-family:'Space Mono',monospace;overflow-x:hidden;cursor:none}
  .cursor{width:12px;height:12px;background:var(--accent);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s;mix-blend-mode:difference}
  .cursor-ring{width:36px;height:36px;border:1px solid var(--accent);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .25s ease,width .3s,height .3s;mix-blend-mode:difference}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.4}
  header{position:fixed;top:0;left:0;right:0;z-index:500;padding:1.5rem 3rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);backdrop-filter:blur(12px);background:rgba(10,10,8,.85)}
  .logo{font-family:'DM Serif Display',serif;font-size:1.5rem;letter-spacing:.08em;color:var(--cream);text-decoration:none}
  .logo span{color:var(--accent)}
  nav{display:flex;gap:2rem;align-items:center}
  nav a{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--cream);text-decoration:none;opacity:.6;transition:opacity .2s}
  nav a:hover{opacity:1;color:var(--accent)}
  .hero{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 3rem 4rem;position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
  .hero-marquee{position:absolute;top:38%;left:0;right:0;overflow:hidden;white-space:nowrap;opacity:.06}
  .hero-marquee-inner{display:inline-block;animation:marquee 18s linear infinite;font-family:'DM Serif Display',serif;font-size:14vw;color:var(--cream);letter-spacing:-.02em}
  @keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  .hero-tag{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin-bottom:1.5rem;opacity:0;animation:fadeUp .8s ease .2s forwards}
  .hero h1{font-family:'DM Serif Display',serif;font-size:clamp(3.5rem,9vw,8rem);line-height:.92;letter-spacing:-.02em;max-width:800px;opacity:0;animation:fadeUp .9s ease .4s forwards}
  .hero h1 em{font-style:italic;color:var(--accent)}
  .hero-sub{margin-top:2rem;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;max-width:320px;line-height:1.8;opacity:0;animation:fadeUp .9s ease .6s forwards;color:var(--cream);opacity:0}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  .hero-scroll{position:absolute;right:3rem;bottom:4rem;writing-mode:vertical-rl;font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;opacity:.35;display:flex;align-items:center;gap:1rem}
  .hero-scroll::before{content:'';display:block;width:1px;height:60px;background:var(--cream);animation:scrollLine 1.8s ease-in-out infinite}
  @keyframes scrollLine{0%,100%{opacity:.2;transform:scaleY(1)}50%{opacity:.7;transform:scaleY(.4)}}
  .filter-bar{padding:1.5rem 3rem;border-bottom:1px solid var(--border);display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
  .filter-label{font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;opacity:.35;margin-right:.5rem}
  .filter-btn{background:none;border:1px solid var(--border);color:var(--cream);font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.4rem 1rem;cursor:none;transition:all .2s}
  .filter-btn:hover,.filter-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .grid-section{padding:4rem 3rem}
  .section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2.5rem;border-bottom:1px solid var(--border);padding-bottom:1rem}
  .section-title{font-family:'DM Serif Display',serif;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;opacity:.4}
  .section-count{font-size:.55rem;letter-spacing:.15em;opacity:.3}
  .artists-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:var(--border)}
  .artist-card{background:var(--bg);position:relative;overflow:hidden;transition:transform .3s ease;cursor:none}
  .artist-card:hover{z-index:2}
  .artist-card:hover .card-img img{transform:scale(1.06)}
  .artist-card:hover .card-email{transform:translateY(0);opacity:1}
  .card-img{aspect-ratio:4/5;overflow:hidden;background:var(--muted);position:relative}
  .card-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease;display:block}
  .card-img.placeholder{background:linear-gradient(135deg,var(--muted) 0%,#1a1a14 100%);display:flex;align-items:center;justify-content:center}
  .card-img.placeholder .initials{font-family:'DM Serif Display',serif;font-size:4rem;color:var(--border);letter-spacing:-.02em}
  .card-type-badge{position:absolute;top:1rem;left:1rem;font-size:.5rem;letter-spacing:.25em;text-transform:uppercase;background:var(--accent);color:var(--bg);padding:.25rem .6rem;font-family:'Space Mono',monospace}
  .card-body{padding:1.2rem 1.4rem}
  .card-name{font-family:'DM Serif Display',serif;font-size:1.4rem;line-height:1.1;margin-bottom:.3rem}
  .card-discipline{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;opacity:.4;margin-bottom:.8rem}
  .card-bio{font-size:.62rem;line-height:1.7;opacity:.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:1rem}
  .card-email{display:inline-flex;align-items:center;gap:.5rem;font-size:.6rem;letter-spacing:.08em;color:var(--accent);text-decoration:none;border-top:1px solid var(--border);padding-top:.8rem;width:100%;transform:translateY(6px);opacity:0;transition:transform .3s ease,opacity .3s ease}
  .card-email::before{content:'→';font-size:.8rem}
  .card-email:hover{color:var(--cream)}
  .featured-row{background:var(--bg);border-bottom:1px solid var(--border)}
  .featured-inner{display:grid;grid-template-columns:1fr 1fr;min-height:420px}
  .featured-media{overflow:hidden;position:relative}
  .featured-media-inner{width:100%;height:100%;background:linear-gradient(160deg,#1a1a14 0%,#2a2a1a 40%,#0a0a08 100%);display:flex;align-items:center;justify-content:center;transition:transform .6s ease}
  .featured-row:hover .featured-media-inner{transform:scale(1.04)}
  .featured-initials{font-family:'DM Serif Display',serif;font-size:8rem;color:#2a2a22;letter-spacing:-.04em;opacity:.6}
  .featured-content{padding:4rem 3rem;display:flex;flex-direction:column;justify-content:flex-end;border-left:1px solid var(--border);position:relative}
  .featured-label{position:absolute;top:2rem;left:3rem;font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:var(--red)}
  .featured-name{font-family:'DM Serif Display',serif;font-size:clamp(2.5rem,4vw,4rem);line-height:.95;margin-bottom:.5rem}
  .featured-name em{font-style:italic;color:var(--accent)}
  .featured-discipline{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;opacity:.35;margin-bottom:1.5rem}
  .featured-bio{font-size:.68rem;line-height:1.9;opacity:.55;max-width:340px;margin-bottom:2rem}
  .featured-email{display:inline-flex;align-items:center;gap:.8rem;font-size:.65rem;letter-spacing:.1em;color:var(--accent);text-decoration:none;border:1px solid var(--border);padding:.7rem 1.2rem;transition:all .2s}
  .featured-email:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .featured-email::before{content:'✉';font-size:.9rem}
  .contact-section{padding:5rem 3rem;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start}
  .contact-left h2{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,4rem);line-height:.95;margin-bottom:1rem}
  .contact-left h2 em{font-style:italic;color:var(--accent)}
  .contact-left p{font-size:.65rem;line-height:1.9;opacity:.45;max-width:320px}
  .contact-right{display:flex;flex-direction:column;gap:0}
  .contact-item{border-top:1px solid var(--border);padding:1.2rem 0;display:flex;justify-content:space-between;align-items:center}
  .contact-item:last-child{border-bottom:1px solid var(--border)}
  .contact-item-name{font-family:'DM Serif Display',serif;font-size:1.1rem}
  .contact-item-meta{text-align:right}
  .contact-item-discipline{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;opacity:.3;display:block;margin-bottom:.3rem}
  .contact-item-email{font-size:.62rem;color:var(--accent);text-decoration:none;transition:color .2s}
  .contact-item-email:hover{color:var(--cream)}
  footer{border-top:1px solid var(--border);padding:2rem 3rem;display:flex;justify-content:space-between;align-items:center;font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;opacity:.3}
  .artist-card.hidden{display:none}
  @media(max-width:768px){
    header{padding:1.2rem 1.5rem}
    .hero{padding:0 1.5rem 3rem}
    .hero h1{font-size:clamp(2.8rem,12vw,5rem)}
    .filter-bar{padding:1rem 1.5rem}
    .grid-section{padding:3rem 1.5rem}
    .featured-inner{grid-template-columns:1fr}
    .featured-content{padding:2rem 1.5rem;border-left:none;border-top:1px solid var(--border)}
    .contact-section{grid-template-columns:1fr;padding:3rem 1.5rem;gap:2.5rem}
    footer{padding:1.5rem;flex-direction:column;gap:.5rem;text-align:center}
    .hero-scroll{display:none}
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<script>
/* ============================================================
   ✏️  EDIT YOUR ARTISTS HERE — everything updates automatically
   ============================================================

   For each artist fill in:
   - name        : Full name
   - initials    : 2 letters shown as placeholder (until you add a photo)
   - photo       : Leave as "" to use initials, or put an image URL/path e.g. "photos/jade.jpg"
   - discipline  : Their role e.g. "Rapper · Producer"
   - type        : One of: music | visual | photography | design
   - bio         : Short description (2 sentences max)
   - email       : Their contact email

   To ADD an artist: copy one block and paste it inside the array, separated by a comma.
   To REMOVE an artist: delete that block.
   The FIRST artist in the list automatically becomes the Featured Artist.
*/

const ARTISTS = [
  {
    name:       "Fenno",
    initials:   "",
    photo:      "https://snipboard.io/BE4HZe.jpg",
    discipline: "Producer · Artist · Songwriter",
    type:       "music",
    bio:        "Underground Artist crafting cinematic soundscapes at the intersection of Jerk and experimental hip-hop.",
    email:      "fennomgmt@gmail.com",
    featuredBio: "Based  in London, Fenno has been quietly building one of the most distinctive catalogs in underground music. His approach blends jerk, trap percussion, and field recordings into something genuinely new. Currently available for sync licensing, collaborations, and limited live bookings."
  },
  {
    name:       "TrueDenim",
    initials:   "",
    photo: "https://snipboard.io/VFWHZy.jpg",
    discipline: "Rapper · Songwriter · Artist",
    type:       "music",
    bio:        "Underground Artist crafting cinematic soundscapes at the intersection of cloud and experimental hip-hop.",
    email:      "truedenimmgmt@gmail.com"
  }
 ];

/* ============================================================
   ✏️  SITE SETTINGS — change these to personalise the site
   ============================================================ */

const SITE = {
  name:       "Inayat Management Co.",
  logoText:   "INAYAT·MGMT CO.",
  tagline:    "Where raw talent meets the world",
  subtext:    "A curated collective of independent artists, producers, designers, and creatives. Booking, collabs, and press inquiries welcome.",
  rosterTitle:"The Roster",
  contactText:"All artists are available for bookings, collaborations, commissions, and press enquiries. Reach out directly via their listed email or get in touch with the collective.",
  year:       "2026"
};

/* ============================================================
   🔧 ENGINE — no need to edit below this line
   ============================================================ */

function typeLabel(type) {
  return { music: "Music", visual: "Visual Art", photography: "Photography", design: "Design" }[type] || type;
}

function initials(name) {
  return name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
}

function buildCards() {
  const grid = document.getElementById("artistGrid");
  ARTISTS.forEach(a => {
    const div = document.createElement("div");
    div.className = "artist-card";
    div.dataset.type = a.type;
    const imgHTML = a.photo
      ? `<div class="card-img"><span class="card-type-badge">${typeLabel(a.type)}</span><img src="${a.photo}" alt="${a.name}" loading="lazy"></div>`
      : `<div class="card-img placeholder"><span class="card-type-badge">${typeLabel(a.type)}</span><span class="initials">${a.initials || initials(a.name)}</span></div>`;
    div.innerHTML = `
      <div class="card-inner">
        ${imgHTML}
        <div class="card-body">
          <div class="card-name">${a.name}</div>
          <div class="card-discipline">${a.discipline}</div>
          <div class="card-bio">${a.bio}</div>
          <a class="card-email" href="mailto:${a.email}">${a.email}</a>
        </div>
      </div>`;
    grid.appendChild(div);
  });
  document.getElementById("countLabel").textContent = `${ARTISTS.length} Creatives`;
}

function buildFeatured() {
  const f = ARTISTS[0];
  const nameParts = f.name.split(" ");
  const first = nameParts[0];
  const last = nameParts.slice(1).join(" ");
  document.getElementById("featuredInitials").textContent = f.initials || initials(f.name);
  document.getElementById("featuredName").innerHTML = `${first}<br><em>${last}</em>`;
  document.getElementById("featuredDiscipline").textContent = f.discipline;
  document.getElementById("featuredBio").textContent = f.featuredBio || f.bio;
  document.getElementById("featuredEmail").href = `mailto:${f.email}`;
  document.getElementById("featuredEmail").textContent = f.email;
}

function buildContact() {
  const list = document.getElementById("contactList");
  ARTISTS.forEach(a => {
    const div = document.createElement("div");
    div.className = "contact-item";
    div.innerHTML = `
      <div class="contact-item-name">${a.name}</div>
      <div class="contact-item-meta">
        <span class="contact-item-discipline">${a.discipline}</span>
        <a class="contact-item-email" href="mailto:${a.email}">${a.email}</a>
      </div>`;
    list.appendChild(div);
  });
}

function buildSite() {
  document.title = `${SITE.name} — Artists & Creatives`;
  document.getElementById("logoText").textContent = SITE.logoText;
  document.getElementById("heroTag").textContent = `${SITE.name} — A Creative Collective`;
  document.getElementById("heroTagline").innerHTML = SITE.tagline.replace("raw", "<em>raw</em>");
  document.getElementById("heroSub").textContent = SITE.subtext;
  document.getElementById("rosterTitle").textContent = SITE.rosterTitle;
  document.getElementById("contactText").textContent = SITE.contactText;
  document.getElementById("footerName").textContent = `© ${SITE.year} ${SITE.name}`;
  document.getElementById("marqueeText").textContent = `${SITE.name.toUpperCase()} · ARTISTS · CREATIVES · VISIONARIES · ${SITE.name.toUpperCase()} · ARTISTS · CREATIVES · VISIONARIES · `;
  buildCards();
  buildFeatured();
  buildContact();
}

document.addEventListener("DOMContentLoaded", buildSite);

function filterCards(type, btn) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const cards = document.querySelectorAll(".artist-card");
  let count = 0;
  cards.forEach(card => {
    const match = type === "all" || card.dataset.type === type;
    card.classList.toggle("hidden", !match);
    if (match) count++;
  });
  document.getElementById("countLabel").textContent =
    type === "all" ? `${count} Creatives` : `${count} ${btn.textContent} Artists`;
}
</script>

<header>
  <a class="logo" href="#"><span id="logoText"></span></a>
  <nav>
    <a href="#artists">Artists</a>
    <a href="#featured">Featured</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-marquee"><div class="hero-marquee-inner" id="marqueeText"></div></div>
  <div class="hero-tag" id="heroTag"></div>
  <h1 id="heroTagline"></h1>
  <p class="hero-sub" id="heroSub"></p>
  <div class="hero-scroll">Scroll</div>
</section>

<div class="filter-bar" id="artists">
  <span class="filter-label">Filter by :</span>
  <button class="filter-btn active" onclick="filterCards('all',this)">All</button>
  <button class="filter-btn" onclick="filterCards('music',this)">Music</button>
  <button class="filter-btn" onclick="filterCards('visual',this)">Visual Art</button>
  <button class="filter-btn" onclick="filterCards('photography',this)">Photography</button>
  <button class="filter-btn" onclick="filterCards('design',this)">Design</button>
</div>

<section class="grid-section">
  <div class="section-header">
    <span class="section-title" id="rosterTitle"></span>
    <span class="section-count" id="countLabel"></span>
  </div>
  <div class="artists-grid" id="artistGrid"></div>
</section>

<section class="featured-row" id="featured">
  <div class="featured-inner">
    <div class="featured-media">
      <div class="featured-media-inner">
        <div class="featured-initials" id="featuredInitials"></div>
      </div>
    </div>
    <div class="featured-content">
      <span class="featured-label">⬤ FEATURED ARTIST</span>
      <div class="featured-name" id="featuredName"></div>
      <div class="featured-discipline" id="featuredDiscipline"></div>
      <p class="featured-bio" id="featuredBio"></p>
      <a class="featured-email" id="featuredEmail" href="#"></a>
    </div>
  </div>
</section>

<section class="contact-section" id="contact">
  <div class="contact-left">
    <h2>Get in<br><em>touch</em></h2>
    <p id="contactText"></p>
  </div>
  <div class="contact-right" id="contactList"></div>
</section>

<footer>
  <span id="footerName"></span>
  <span>All Rights Reserved</span>
  <span>Built with intention</span>
</footer>

<script>
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mouseX=0,mouseY=0,ringX=0,ringY=0;
  document.addEventListener('mousemove',e=>{
    mouseX=e.clientX;mouseY=e.clientY;
    cursor.style.left=mouseX+'px';cursor.style.top=mouseY+'px';
  });
  function animateRing(){
    ringX+=(mouseX-ringX)*.12;ringY+=(mouseY-ringY)*.12;
    ring.style.left=ringX+'px';ring.style.top=ringY+'px';
    requestAnimationFrame(animateRing);
  }
  animateRing();
  document.addEventListener('mouseover',e=>{
    if(e.target.matches('a,button')){cursor.style.width='20px';cursor.style.height='20px';ring.style.width='60px';ring.style.height='60px';}
    else{cursor.style.width='12px';cursor.style.height='12px';ring.style.width='36px';ring.style.height='36px';}
  });
</script>
</body>
</html>
